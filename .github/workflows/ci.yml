name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [panel, daemon]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build ${{ matrix.target }}
        run: |
          cd packages/${{ matrix.target }}
          go build -o /dev/null ./cmd/${{ matrix.target }}

  frontend:
    name: Frontend Build + i18n Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: i18n alignment check (zh/en/ja)
        run: node scripts/i18n-gap-check.js

      - name: Build
        run: cd web && npm run build

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build all
        run: bash scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taps-dist
          path: |
            dist/panel-linux-*
            dist/daemon-linux-*
            dist/web/
          retention-days: 7
